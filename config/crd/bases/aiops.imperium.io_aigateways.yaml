---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: aigateways.aiops.imperium.io
spec:
  group: aiops.imperium.io
  names:
    kind: AIGateway
    listKind: AIGatewayList
    plural: aigateways
    shortNames:
    - aigw
    singular: aigateway
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .spec.endpoint
      name: Endpoint
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AIGateway represents an existing AI gateway (LiteLLM, Envoy, Kong, ...) that
          the operator observes in read-only mode.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AIGatewaySpec defines the desired state of AIGateway.
            properties:
              auth:
                description: Auth holds credential references for reaching the gateway.
                properties:
                  secretRef:
                    description: SecretRef points to a Secret holding the gateway
                      admin/API token.
                    properties:
                      key:
                        description: Key within the Secret to read. Optional; defaults
                          are collector-specific.
                        type: string
                      name:
                        description: Name of the Secret in the same namespace as the
                          referencing resource.
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                type: object
              endpoint:
                description: Endpoint is the base URL of the gateway control/data
                  plane.
                minLength: 1
                type: string
              namespaceSelector:
                description: |-
                  NamespaceSelector restricts which namespaces are governed by this gateway.
                  An empty selector governs no namespace until explicitly set.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              telemetry:
                description: Telemetry describes how usage data is collected.
                properties:
                  metricsEndpoint:
                    default: /metrics
                    description: MetricsEndpoint is the HTTP path exposing metrics
                      (for the prometheus mode).
                    type: string
                  mode:
                    default: fake
                    description: Mode selects the TelemetryCollector implementation.
                    enum:
                    - prometheus
                    - litellm
                    - fake
                    - configmap
                    - aigw
                    type: string
                  sourceConfigMap:
                    description: |-
                      SourceConfigMap is the name of the ConfigMap holding usage samples (for the
                      configmap mode); read from the gateway's own namespace, key "usage.json".
                    type: string
                required:
                - mode
                type: object
              type:
                description: Type identifies the underlying gateway technology.
                enum:
                - litellm
                - envoy
                - kong
                - gateway-api
                - custom
                type: string
            required:
            - endpoint
            - telemetry
            - type
            type: object
          status:
            description: AIGatewayStatus defines the observed state of AIGateway.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the gateway state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              governedNamespaces:
                description: GovernedNamespaces lists namespaces currently matched
                  by NamespaceSelector.
                items:
                  type: string
                type: array
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation last reconciled.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
