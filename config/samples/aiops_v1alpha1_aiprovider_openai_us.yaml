apiVersion: aiops.imperium.io/v1alpha1
kind: AIProvider
metadata:
  name: openai-us
  labels:
    app.kubernetes.io/name: ai-sovereign-finops-operator
spec:
  type: openai
  region: eastus
  dataResidency: us
  managed: true
  pricing:
    currency: EUR
    inputTokenPricePerMillion: "5"
    outputTokenPricePerMillion: "15"
  compliance:
    allowedForSensitiveData: false
    allowedCountries:
      - US
