apiVersion: aiops.imperium.io/v1alpha1
kind: AIProvider
metadata:
  name: azure-openai-france
  labels:
    app.kubernetes.io/name: ai-sovereign-finops-operator
spec:
  type: azure-openai
  region: francecentral
  dataResidency: france
  managed: true
  # Real list price for gpt-4o (Azure OpenAI Global Standard), the model this
  # provider serves in the demo: published USD 2.50 in / 10.00 out per 1M tokens
  # (June 2026), converted to EUR at 1 USD = 0.92 EUR.
  # Source: https://azure.microsoft.com/en-us/pricing/details/azure-openai/
  pricing:
    currency: EUR
    inputTokenPricePerMillion: "2.30"
    outputTokenPricePerMillion: "9.20"
  compliance:
    allowedForSensitiveData: true
    allowedCountries:
      - FR
      - EU
