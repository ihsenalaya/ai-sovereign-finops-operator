apiVersion: aiops.imperium.io/v1alpha1
kind: AIBudgetPolicy
metadata:
  name: rh-budget
  labels:
    app.kubernetes.io/name: ai-sovereign-finops-operator
spec:
  target:
    namespace: rh
    team: rh
    application: chatbot-rh
  period: monthly
  budgetEUR: "500"
  warningThresholdPercent: 70
  criticalThresholdPercent: 90
  hardLimitPercent: 100
  actions:
    onWarning:
      - alert
    onCritical:
      - enableCache
      - routeToCheaperModel
    onHardLimit:
      - blockOrRequireApproval
  fallbackModelRef: mistral-small
