apiVersion: aiops.imperium.io/v1alpha1
kind: AIBudgetPolicy
metadata:
  name: rh-budget
  labels:
    app.kubernetes.io/name: ai-sovereign-finops-operator
spec:
  target:
    namespace: rh
    team: rh
    application: chatbot-rh
  # Observation window = daily; the engine forecasts monthly spend (run-rate)
  # and compares it to budgetEUR (a monthly cap).
  period: daily
  budgetEUR: "500"
  warningThresholdPercent: 70
  criticalThresholdPercent: 90
  hardLimitPercent: 100
  actions:
    onWarning:
      - alert
    onCritical:
      - enableCache
      - routeToCheaperModel
    onHardLimit:
      - blockOrRequireApproval
  fallbackModelRef: mistral-large
