---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: aiqualitygates.aiops.imperium.io
spec:
  group: aiops.imperium.io
  names:
    kind: AIQualityGate
    listKind: AIQualityGateList
    plural: aiqualitygates
    shortNames:
    - aiqgate
    singular: aiqualitygate
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.target.namespace
      name: TargetNS
      type: string
    - jsonPath: .spec.target.application
      name: Application
      type: string
    - jsonPath: .spec.sourceModel
      name: Source
      type: string
    - jsonPath: .spec.candidateModel
      name: Candidate
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.verdict
      name: Verdict
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AIQualityGate validates whether a candidate model is safe enough
          for one app.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AIQualityGateSpec defines the desired quality validation
              for one application.
            properties:
              canary:
                description: Canary configures the desired canary validation.
                properties:
                  duration:
                    description: Duration of the canary window, for example "30m".
                    type: string
                  enabled:
                    description: Enabled requires canary validation before a full
                      reroute.
                    type: boolean
                  percent:
                    description: Percent of traffic intended for the candidate model
                      during canary.
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                type: object
              candidateModel:
                description: CandidateModel is the provider-side model being evaluated
                  as a replacement.
                minLength: 1
                type: string
              evidenceRef:
                description: |-
                  EvidenceRef optionally points to deterministic golden-run results produced
                  by a CI job or future prompt runner. It is required when response-level
                  checks such as schemaValid or requiredKeywords are enabled.
                properties:
                  key:
                    description: Key inside the ConfigMap. Defaults are resource-specific.
                    type: string
                  name:
                    description: Name of the ConfigMap.
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace of the ConfigMap. Defaults to the owning
                      resource namespace.
                    type: string
                required:
                - name
                type: object
              gatewayRef:
                description: GatewayRef optionally pins telemetry to a specific AIGateway.
                type: string
              goldenDatasetRef:
                description: GoldenDatasetRef points to the ConfigMap holding prompts.yaml/prompts.json.
                properties:
                  key:
                    description: Key inside the ConfigMap. Defaults are resource-specific.
                    type: string
                  name:
                    description: Name of the ConfigMap.
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace of the ConfigMap. Defaults to the owning
                      resource namespace.
                    type: string
                required:
                - name
                type: object
              period:
                default: monthly
                description: Period is the telemetry window used for operational checks.
                enum:
                - daily
                - weekly
                - monthly
                type: string
              requiredChecks:
                description: RequiredChecks configures the deterministic and operational
                  guardrails.
                properties:
                  maxErrorRatePercent:
                    description: MaxErrorRatePercent is the maximum observed candidate
                      HTTP error rate.
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                  maxLatencyIncreasePercent:
                    description: MaxLatencyIncreasePercent is the maximum candidate
                      latency increase versus the source model.
                    format: int32
                    minimum: 0
                    type: integer
                  maxRetryIncreasePercent:
                    description: MaxRetryIncreasePercent is reserved for retry telemetry
                      when available.
                    format: int32
                    minimum: 0
                    type: integer
                  noSensitiveDataLeak:
                    description: NoSensitiveDataLeak requires evidence that candidate
                      responses did not leak sensitive data.
                    type: boolean
                  noUnexpectedRefusal:
                    description: NoUnexpectedRefusal requires evidence that the candidate
                      did not refuse valid prompts.
                    type: boolean
                  requiredKeywords:
                    description: RequiredKeywords requires evidence that expected
                      domain terms are present.
                    items:
                      type: string
                    type: array
                  schemaValid:
                    description: SchemaValid requires golden-run evidence that candidate
                      responses match the expected schema.
                    type: boolean
                type: object
              rollback:
                description: Rollback configures rollback thresholds.
                properties:
                  enabled:
                    description: Enabled allows automatic rollback once routing actuation
                      is wired.
                    type: boolean
                  onErrorRatePercent:
                    description: OnErrorRatePercent is the error-rate threshold that
                      should trigger rollback.
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                  onLatencyIncreasePercent:
                    description: OnLatencyIncreasePercent is the latency regression
                      threshold that should trigger rollback.
                    format: int32
                    minimum: 0
                    type: integer
                type: object
              sourceModel:
                description: SourceModel is the current provider-side model identifier.
                minLength: 1
                type: string
              target:
                description: |-
                  Target is the application this gate protects. The intended granularity is
                  one AIQualityGate per application.
                properties:
                  application:
                    description: Application is the application label/value in telemetry
                      samples.
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace is the application namespace.
                    minLength: 1
                    type: string
                  team:
                    description: Team optionally narrows telemetry to one team when
                      the same app name is shared.
                    type: string
                required:
                - application
                - namespace
                type: object
            required:
            - candidateModel
            - goldenDatasetRef
            - sourceModel
            - target
            type: object
          status:
            description: AIQualityGateStatus defines the observed state of AIQualityGate.
            properties:
              canaryStatus:
                description: CanaryStatus summarizes the canary contract state.
                type: string
              candidateObservation:
                description: CandidateObservation is the observed candidate model
                  telemetry for the target app.
                properties:
                  errorRatePercent:
                    description: ErrorRatePercent is Errors / Requests * 100, serialized
                      as a decimal string.
                    type: string
                  errors:
                    description: Errors observed for the target app/model.
                    format: int64
                    type: integer
                  latencyTelemetryAvailable:
                    description: LatencyTelemetryAvailable is true when ObservedLatencyMillis
                      is real telemetry.
                    type: boolean
                  model:
                    description: Model is the provider-side model identifier.
                    type: string
                  observedLatencyMillis:
                    description: ObservedLatencyMillis is the measured mean latency
                      when telemetry exists.
                    type: string
                  requests:
                    description: Requests observed for the target app/model.
                    format: int64
                    type: integer
                type: object
              checkedSamples:
                description: CheckedSamples is the number of golden dataset prompts
                  parsed.
                format: int32
                type: integer
              conditions:
                description: Conditions represent the latest available observations
                  of the gate state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              failedChecks:
                description: FailedChecks is the number of failed deterministic or
                  operational checks.
                format: int32
                type: integer
              failureMessages:
                description: FailureMessages explains failed or missing checks for
                  human review.
                items:
                  type: string
                type: array
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation last reconciled.
                format: int64
                type: integer
              phase:
                description: Phase summarizes the gate result.
                enum:
                - Pending
                - Passed
                - Failed
                type: string
              sourceObservation:
                description: SourceObservation is the observed source model telemetry
                  for the target app.
                properties:
                  errorRatePercent:
                    description: ErrorRatePercent is Errors / Requests * 100, serialized
                      as a decimal string.
                    type: string
                  errors:
                    description: Errors observed for the target app/model.
                    format: int64
                    type: integer
                  latencyTelemetryAvailable:
                    description: LatencyTelemetryAvailable is true when ObservedLatencyMillis
                      is real telemetry.
                    type: boolean
                  model:
                    description: Model is the provider-side model identifier.
                    type: string
                  observedLatencyMillis:
                    description: ObservedLatencyMillis is the measured mean latency
                      when telemetry exists.
                    type: string
                  requests:
                    description: Requests observed for the target app/model.
                    format: int64
                    type: integer
                type: object
              verdict:
                description: |-
                  Verdict is a stable machine-readable decision: candidate-safe,
                  candidate-risk or insufficient-data.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
