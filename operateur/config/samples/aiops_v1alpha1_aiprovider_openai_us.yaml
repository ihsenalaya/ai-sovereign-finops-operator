apiVersion: aiops.imperium.io/v1alpha1
kind: AIProvider
metadata:
  name: openai-us
  labels:
    app.kubernetes.io/name: ai-sovereign-finops-operator
spec:
  type: openai
  region: eastus
  dataResidency: us
  managed: true
  # Real list price for gpt-4o (OpenAI), the model this provider serves in the
  # demo: published USD 2.50 in / 10.00 out per 1M tokens (June 2026), converted
  # to EUR at 1 USD = 0.92 EUR.
  # Source: https://openai.com/api/pricing/
  pricing:
    currency: EUR
    inputTokenPricePerMillion: "2.30"
    outputTokenPricePerMillion: "9.20"
  compliance:
    allowedForSensitiveData: false
    allowedCountries:
      - US
