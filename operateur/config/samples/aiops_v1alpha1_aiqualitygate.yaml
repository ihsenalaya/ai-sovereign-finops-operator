# Example golden datasets and evidence for four demo applications.
# Replace these prompts/results with application-owned datasets produced by the
# real evaluation job before using the score for production decisions.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: finance-golden-prompts
  namespace: default
data:
  prompts.yaml: |
    - id: risk-summary
      prompt: "Summarize key counterparty risks for a new supplier."
      expected:
        reference: "Counterparty risk should mention liquidity, concentration and operational risk."
        requiredKeywords: ["counterparty", "liquidity", "risk"]
        maxTokens: 300
    - id: var-explain
      prompt: "Explain value-at-risk in two sentences."
      expected:
        reference: "Value-at-risk estimates a portfolio loss threshold at a confidence level over a time horizon."
        requiredKeywords: ["loss", "confidence", "portfolio"]
        maxTokens: 120
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: finance-quality-evidence
  namespace: default
data:
  results.yaml: |
    - id: risk-summary
      model: gpt-us-mini
      reference: "Counterparty risk should mention liquidity, concentration and operational risk."
      actual: "Counterparty risk includes liquidity pressure, concentration exposure and operational delivery risk."
      semanticScore: 96
      schemaValid: true
      unexpectedRefusal: false
      sensitiveDataLeak: false
      requiredKeywordsPresent: true
    - id: var-explain
      model: gpt-us-mini
      reference: "Value-at-risk estimates a portfolio loss threshold at a confidence level over a time horizon."
      actual: "Value-at-risk estimates the maximum portfolio loss expected for a confidence level and horizon."
      semanticScore: 95
      schemaValid: true
      unexpectedRefusal: false
      sensitiveDataLeak: false
      requiredKeywordsPresent: true
    - id: risk-summary
      model: mistral-large-latest
      reference: "Counterparty risk should mention liquidity, concentration and operational risk."
      actual: "Supplier counterparty risk covers liquidity, concentration, operational resilience and contractual exposure."
      semanticScore: 94
      schemaValid: true
      unexpectedRefusal: false
      sensitiveDataLeak: false
      requiredKeywordsPresent: true
    - id: var-explain
      model: mistral-large-latest
      reference: "Value-at-risk estimates a portfolio loss threshold at a confidence level over a time horizon."
      actual: "VaR describes a portfolio loss level not expected to be exceeded at a stated confidence over a horizon."
      semanticScore: 93
      schemaValid: true
      unexpectedRefusal: false
      sensitiveDataLeak: false
      requiredKeywordsPresent: true
---
apiVersion: aiops.imperium.io/v1alpha1
kind: AIQualityGate
metadata:
  name: finance-risk-assistant-quality-gate
  namespace: default
spec:
  target:
    namespace: finance
    application: risk-assistant
  sourceModel: gpt-us-mini
  candidateModel: mistral-large-latest
  goldenDatasetRef: { name: finance-golden-prompts, namespace: default }
  evidenceRef: { name: finance-quality-evidence, namespace: default }
  evaluation:
    endpoint: http://greenops-aigw.envoy-gateway-system.svc.cluster.local:80/v1/chat/completions
    maxTokens: 120
    timeoutSeconds: 60
  latencyThresholdMs: 2500
  minSamples: 2
  tolerancePoints: 3
  weights:
    judged: 0
  requiredChecks:
    noUnexpectedRefusal: true
    noSensitiveDataLeak: true
    requiredKeywords: [risk, liquidity]
    maxErrorRatePercent: 2
    maxLatencyIncreasePercent: 20
  canary:
    enabled: true
    percent: 5
    duration: 30m
  rollback:
    enabled: true
    onErrorRatePercent: 3
    onLatencyIncreasePercent: 30
---
