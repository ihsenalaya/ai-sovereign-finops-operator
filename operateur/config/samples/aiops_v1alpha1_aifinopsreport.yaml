apiVersion: aiops.imperium.io/v1alpha1
kind: AIFinOpsReport
metadata:
  name: monthly-ai-report-rh
  labels:
    app.kubernetes.io/name: ai-sovereign-finops-operator
spec:
  target:
    namespace: rh
    # Observation window = daily; the operator forecasts the month (run-rate).
    period: daily
  gatewayRef: main-gateway
