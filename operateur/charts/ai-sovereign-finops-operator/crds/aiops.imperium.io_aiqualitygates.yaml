---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: aiqualitygates.aiops.imperium.io
spec:
  group: aiops.imperium.io
  names:
    kind: AIQualityGate
    listKind: AIQualityGateList
    plural: aiqualitygates
    shortNames:
    - aiqgate
    singular: aiqualitygate
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.target.namespace
      name: TargetNS
      type: string
    - jsonPath: .spec.target.application
      name: Application
      type: string
    - jsonPath: .spec.sourceModel
      name: Source
      type: string
    - jsonPath: .spec.candidateModel
      name: Candidate
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.verdict
      name: Verdict
      type: string
    - jsonPath: .status.qualityScore
      name: Score
      type: number
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AIQualityGate validates whether a candidate model is safe enough
          for one app.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AIQualityGateSpec defines the desired quality validation
              for one application.
            properties:
              canary:
                description: Canary configures the desired canary validation.
                properties:
                  duration:
                    description: Duration of the canary window, for example "30m".
                    type: string
                  enabled:
                    description: Enabled requires canary validation before a full
                      reroute.
                    type: boolean
                  percent:
                    description: Percent of traffic intended for the candidate model
                      during canary.
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                type: object
              candidateModel:
                description: CandidateModel is the provider-side model being evaluated
                  as a replacement.
                minLength: 1
                type: string
              continuousProbes:
                description: ContinuousProbes optionally enables periodic synthetic
                  quality probes.
                properties:
                  decisionPolicy:
                    description: |-
                      DecisionPolicy controls whether and how the continuous probe verdict affects
                      the main gate verdict. When omitted, the effect defaults to Observe (advisory
                      only), preserving backward compatibility.
                    properties:
                      effect:
                        default: Observe
                        description: |-
                          Effect selects how the continuous probe verdict affects the main verdict.
                          Observe (default): advisory only. BlockOnRisk: probe risk forces the main
                          verdict to candidate-risk (probes can block but never approve alone).
                          ContributeToGate: probe evidence is pooled into the main scoring.
                          Enforce: like BlockOnRisk and also flags the gate as blocking reroute.
                        enum:
                        - Observe
                        - BlockOnRisk
                        - ContributeToGate
                        - Enforce
                        type: string
                      insufficientDataPolicy:
                        default: Block
                        description: |-
                          InsufficientDataPolicy decides what happens when probe evidence is missing or
                          stale. Block: it blocks the gate (insufficient-data). Ignore: it does not
                          affect the main verdict. Default Block.
                        enum:
                        - Block
                        - Ignore
                        type: string
                      minConsecutiveRisk:
                        description: |-
                          MinConsecutiveRisk requires N consecutive risky probe runs before the
                          effective verdict flips to candidate-risk (anti-flapping). Default 1.
                        format: int32
                        minimum: 1
                        type: integer
                      minConsecutiveSafe:
                        description: |-
                          MinConsecutiveSafe requires N consecutive safe probe runs before a prior
                          continuous-probe risk is cleared (anti-flapping). Default 1.
                        format: int32
                        minimum: 1
                        type: integer
                      staleAfter:
                        description: |-
                          StaleAfter marks probe evidence stale once the last successful run is older
                          than this duration, for example "2h". Default "2h". Should be > interval.
                        type: string
                    type: object
                  enabled:
                    description: |-
                      Enabled turns continuous synthetic probes on. When absent or false, the gate
                      keeps its existing one-shot evaluation behaviour unchanged.
                    type: boolean
                  interval:
                    description: Interval is the time between two synthetic runs,
                      for example "1h". Default "1h".
                    type: string
                  maxConcurrency:
                    description: MaxConcurrency caps parallel probe Jobs per gate.
                      Only 1 is supported for now.
                    format: int32
                    maximum: 1
                    minimum: 1
                    type: integer
                  retainRuns:
                    description: |-
                      RetainRuns is the maximum number of per-run evidence ConfigMaps to keep.
                      Older runs are rotated out. Default 20.
                    format: int32
                    minimum: 1
                    type: integer
                  sampleSize:
                    description: 'SampleSize is the number of golden prompts replayed
                      per run. Default: all prompts.'
                    format: int32
                    minimum: 1
                    type: integer
                  slidingWindow:
                    description: SlidingWindow aggregates recent probe evidence, for
                      example "24h". Default "24h".
                    type: string
                  strategy:
                    description: Strategy selects which prompts to replay each run.
                      Default "round-robin".
                    enum:
                    - round-robin
                    - random
                    type: string
                type: object
              evaluation:
                description: Evaluation configures the real gateway-backed evaluator
                  Job.
                properties:
                  endpoint:
                    description: |-
                      Endpoint is the OpenAI-compatible chat completions endpoint used by the
                      evaluator Job. It must be the production data-plane path, not the metrics
                      endpoint. Example:
                      http://greenops-aigw.envoy-gateway-system.svc.cluster.local:80/v1/chat/completions
                    type: string
                  image:
                    description: |-
                      Image overrides the evaluator image. Defaults to the running operator
                      image so Kind demos evaluate with the same build that reconciles the gate.
                    type: string
                  maxTokens:
                    description: MaxTokens limits each golden prompt completion.
                    format: int32
                    minimum: 1
                    type: integer
                  timeoutSeconds:
                    description: TimeoutSeconds is the per-request gateway timeout.
                    format: int32
                    minimum: 1
                    type: integer
                type: object
              evidenceRef:
                description: |-
                  EvidenceRef optionally points to deterministic golden-run results produced
                  by a CI job or future prompt runner. It is required when response-level
                  checks such as schemaValid or requiredKeywords are enabled.
                properties:
                  key:
                    description: Key inside the ConfigMap. Defaults are resource-specific.
                    type: string
                  name:
                    description: Name of the ConfigMap.
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace of the ConfigMap. Defaults to the owning
                      resource namespace.
                    type: string
                required:
                - name
                type: object
              gatewayRef:
                description: GatewayRef optionally pins telemetry to a specific AIGateway.
                type: string
              goldenDatasetRef:
                description: GoldenDatasetRef points to the ConfigMap holding prompts.yaml/prompts.json.
                properties:
                  key:
                    description: Key inside the ConfigMap. Defaults are resource-specific.
                    type: string
                  name:
                    description: Name of the ConfigMap.
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace of the ConfigMap. Defaults to the owning
                      resource namespace.
                    type: string
                required:
                - name
                type: object
              judge:
                description: Judge configures the optional sovereign LLM judge.
                properties:
                  enabled:
                    description: Enabled includes the judged dimension when a sovereign
                      judge model is available.
                    type: boolean
                  modelRef:
                    description: |-
                      ModelRef references the AIModel used as judge. The controller must ensure it
                      is sovereignty-compliant before using it.
                    type: string
                type: object
              latencyThresholdMs:
                description: |-
                  LatencyThresholdMs is the threshold used by the latency dimension: at the
                  threshold the score is 50; half threshold is 100; double threshold is 0.
                format: int32
                minimum: 1
                type: integer
              minSamples:
                description: MinSamples is the minimum number of golden prompts required
                  to score.
                format: int32
                minimum: 1
                type: integer
              period:
                default: monthly
                description: Period is the telemetry window used for operational checks.
                enum:
                - daily
                - weekly
                - monthly
                type: string
              requiredChecks:
                description: RequiredChecks configures the deterministic and operational
                  guardrails.
                properties:
                  maxErrorRatePercent:
                    description: MaxErrorRatePercent is the maximum observed candidate
                      HTTP error rate.
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                  maxLatencyIncreasePercent:
                    description: MaxLatencyIncreasePercent is the maximum candidate
                      latency increase versus the source model.
                    format: int32
                    minimum: 0
                    type: integer
                  maxRetryIncreasePercent:
                    description: MaxRetryIncreasePercent is reserved for retry telemetry
                      when available.
                    format: int32
                    minimum: 0
                    type: integer
                  noSensitiveDataLeak:
                    description: NoSensitiveDataLeak requires evidence that candidate
                      responses did not leak sensitive data.
                    type: boolean
                  noUnexpectedRefusal:
                    description: NoUnexpectedRefusal requires evidence that the candidate
                      did not refuse valid prompts.
                    type: boolean
                  requiredKeywords:
                    description: RequiredKeywords requires evidence that expected
                      domain terms are present.
                    items:
                      type: string
                    type: array
                  schemaValid:
                    description: SchemaValid requires golden-run evidence that candidate
                      responses match the expected schema.
                    type: boolean
                type: object
              rollback:
                description: Rollback configures rollback thresholds.
                properties:
                  enabled:
                    description: Enabled allows automatic rollback once routing actuation
                      is wired.
                    type: boolean
                  onErrorRatePercent:
                    description: OnErrorRatePercent is the error-rate threshold that
                      should trigger rollback.
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                  onLatencyIncreasePercent:
                    description: OnLatencyIncreasePercent is the latency regression
                      threshold that should trigger rollback.
                    format: int32
                    minimum: 0
                    type: integer
                type: object
              sourceModel:
                description: SourceModel is the current provider-side model identifier.
                minLength: 1
                type: string
              target:
                description: |-
                  Target is the application this gate protects. The intended granularity is
                  one AIQualityGate per application.
                properties:
                  application:
                    description: Application is the application label/value in telemetry
                      samples.
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace is the application namespace.
                    minLength: 1
                    type: string
                  team:
                    description: Team optionally narrows telemetry to one team when
                      the same app name is shared.
                    type: string
                required:
                - application
                - namespace
                type: object
              tolerancePoints:
                description: TolerancePoints is the allowed candidate regression versus
                  source score.
                format: int32
                minimum: 0
                type: integer
              weights:
                description: Weights configures the composite AI Quality Score.
                properties:
                  correctness:
                    description: Correctness is the deterministic golden-dataset weight.
                    minimum: 0
                    type: number
                  judged:
                    description: Judged is the sovereign LLM judge weight.
                    minimum: 0
                    type: number
                  latency:
                    description: Latency is the real telemetry latency weight.
                    minimum: 0
                    type: number
                  reliability:
                    description: Reliability is the real telemetry error/timeout/invalid
                      JSON weight.
                    minimum: 0
                    type: number
                  semantic:
                    description: Semantic is the local embedding/reference similarity
                      weight.
                    minimum: 0
                    type: number
                type: object
            required:
            - candidateModel
            - goldenDatasetRef
            - sourceModel
            - target
            type: object
          status:
            description: AIQualityGateStatus defines the observed state of AIQualityGate.
            properties:
              canaryStatus:
                description: CanaryStatus summarizes the canary contract state.
                type: string
              candidateObservation:
                description: CandidateObservation is the observed candidate model
                  telemetry for the target app.
                properties:
                  errorRatePercent:
                    description: ErrorRatePercent is Errors / Requests * 100, serialized
                      as a decimal string.
                    type: string
                  errors:
                    description: Errors observed for the target app/model.
                    format: int64
                    type: integer
                  latencyTelemetryAvailable:
                    description: LatencyTelemetryAvailable is true when ObservedLatencyMillis
                      is real telemetry.
                    type: boolean
                  model:
                    description: Model is the provider-side model identifier.
                    type: string
                  observedLatencyMillis:
                    description: ObservedLatencyMillis is the measured mean latency
                      when telemetry exists.
                    type: string
                  provider:
                    description: Provider is the observed or catalogued provider for
                      the model.
                    type: string
                  requests:
                    description: Requests observed for the target app/model.
                    format: int64
                    type: integer
                type: object
              checkedSamples:
                description: CheckedSamples is the number of golden dataset prompts
                  parsed.
                format: int32
                type: integer
              conditions:
                description: Conditions represent the latest available observations
                  of the gate state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              continuousProbes:
                description: ContinuousProbes reports the synthetic probe scheduler
                  state when enabled.
                properties:
                  blocking:
                    description: |-
                      Blocking is the hysteresis state: true once minConsecutiveRisk is reached and
                      not yet cleared by minConsecutiveSafe. It is what BlockOnRisk/Enforce act on.
                    type: boolean
                  candidateScore:
                    description: CandidateScore is the aggregated candidate composite
                      score over the window.
                    type: number
                  consecutiveRiskCount:
                    description: |-
                      ConsecutiveRiskCount counts consecutive completed runs whose window verdict
                      is candidate-risk (anti-flapping).
                    format: int32
                    type: integer
                  consecutiveSafeCount:
                    description: |-
                      ConsecutiveSafeCount counts consecutive completed runs whose window verdict
                      is candidate-safe (anti-flapping).
                    format: int32
                    type: integer
                  enabled:
                    description: Enabled mirrors spec.continuousProbes.enabled.
                    type: boolean
                  evidenceFresh:
                    description: EvidenceFresh is true when the last successful run
                      is within staleAfter.
                    type: boolean
                  failedChecks:
                    description: FailedChecks lists missing or failed signals from
                      the last aggregation.
                    items:
                      type: string
                    type: array
                  lastPromptIndex:
                    description: LastPromptIndex is the round-robin cursor into the
                      golden dataset.
                    format: int32
                    type: integer
                  lastRunAt:
                    description: LastRunAt is when the last probe run finished.
                    format: date-time
                    type: string
                  lastRunName:
                    description: LastRunName is the Job that produced the last run.
                    type: string
                  lastRunStatus:
                    description: LastRunStatus is Succeeded or Failed.
                    type: string
                  lastScheduledAt:
                    description: LastScheduledAt is when the last probe Job was created.
                    format: date-time
                    type: string
                  nextRunAt:
                    description: NextRunAt is when the next probe run is due.
                    format: date-time
                    type: string
                  observedGeneration:
                    description: ObservedGeneration is the gate generation the probe
                      scheduler last acted on.
                    format: int64
                    type: integer
                  runInProgress:
                    description: RunInProgress is true while a probe Job is active.
                    type: boolean
                  runsObserved:
                    description: RunsObserved is the number of per-run evidence sets
                      in the sliding window.
                    format: int32
                    type: integer
                  sourceScore:
                    description: SourceScore is the aggregated source composite score
                      over the window.
                    type: number
                  verdict:
                    description: 'Verdict is the synthetic-probe verdict: candidate-safe,
                      candidate-risk or insufficient-data.'
                    type: string
                  window:
                    description: Window echoes the aggregation window used.
                    type: string
                type: object
              decision:
                description: |-
                  Decision is the traceable result of the decision engine that combines the
                  baseline gate verdict with the continuous-probe verdict into the effective
                  status.verdict.
                properties:
                  effectiveVerdict:
                    description: EffectiveVerdict is the final, applied gate verdict
                      (mirrors status.verdict).
                    type: string
                  reason:
                    description: |-
                      Reason is a stable machine-readable cause, e.g. ContinuousProbeRisk,
                      ContinuousProbeInsufficientData, BaselineGate, Observe, ContributeToGate.
                    type: string
                  sources:
                    description: Sources records which verdicts contributed to the
                      decision.
                    properties:
                      baselineGate:
                        description: BaselineGate is the existing one-shot/telemetry
                          verdict.
                        properties:
                          effect:
                            description: Effect is the decision effect applied for
                              this source (continuous probes only).
                            type: string
                          evidenceFresh:
                            description: EvidenceFresh is true when probe evidence
                              is within staleAfter (continuous probes only).
                            type: boolean
                          lastRunAt:
                            description: LastRunAt is the last successful probe run
                              (continuous probes only).
                            format: date-time
                            type: string
                          verdict:
                            description: Verdict is candidate-safe, candidate-risk
                              or insufficient-data.
                            type: string
                        type: object
                      continuousProbes:
                        description: ContinuousProbes is the synthetic probe verdict
                          and its applied effect.
                        properties:
                          effect:
                            description: Effect is the decision effect applied for
                              this source (continuous probes only).
                            type: string
                          evidenceFresh:
                            description: EvidenceFresh is true when probe evidence
                              is within staleAfter (continuous probes only).
                            type: boolean
                          lastRunAt:
                            description: LastRunAt is the last successful probe run
                              (continuous probes only).
                            format: date-time
                            type: string
                          verdict:
                            description: Verdict is candidate-safe, candidate-risk
                              or insufficient-data.
                            type: string
                        type: object
                    type: object
                type: object
              dimensions:
                description: Dimensions is a radar-ready view of score components.
                items:
                  description: AIQualityDimensionStatus is one radar-ready score dimension.
                  properties:
                    name:
                      description: Name is one of correctness, reliability, latency,
                        semantic, judged or overall.
                      type: string
                    score:
                      description: Score is normalized in [0,100].
                      type: number
                    weight:
                      description: Weight is the normalized weight used for this dimension.
                        Overall has weight 1.
                      type: number
                  required:
                  - name
                  - score
                  type: object
                type: array
              evaluationJobName:
                description: EvaluationJobName is the Kubernetes Job producing gateway-backed
                  evidence.
                type: string
              evaluationJobPhase:
                description: EvaluationJobPhase is Pending, Running, Succeeded or
                  Failed.
                type: string
              evidenceRef:
                description: EvidenceRef echoes the evidence ConfigMap used or written
                  for audit.
                properties:
                  key:
                    description: Key inside the ConfigMap. Defaults are resource-specific.
                    type: string
                  name:
                    description: Name of the ConfigMap.
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace of the ConfigMap. Defaults to the owning
                      resource namespace.
                    type: string
                required:
                - name
                type: object
              failedChecks:
                description: FailedChecks is the number of failed deterministic or
                  operational checks.
                format: int32
                type: integer
              failureMessages:
                description: FailureMessages explains failed or missing checks for
                  human review.
                items:
                  type: string
                type: array
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation last reconciled.
                format: int64
                type: integer
              phase:
                description: Phase summarizes the gate result.
                enum:
                - Pending
                - Passed
                - Failed
                type: string
              qualityScore:
                description: QualityScore is the candidate composite score in [0,100].
                type: number
              samples:
                description: Samples is the number of candidate evidence samples used
                  by the quality score.
                format: int32
                type: integer
              scoreBreakdown:
                description: ScoreBreakdown contains the candidate score components.
                properties:
                  correctness:
                    description: Correctness is the deterministic golden-dataset score.
                    type: number
                  judged:
                    description: Judged is the optional sovereign judge score.
                    type: number
                  latency:
                    description: Latency is the real telemetry latency score.
                    type: number
                  reliability:
                    description: Reliability is the real telemetry reliability score.
                    type: number
                  semantic:
                    description: Semantic is the reference-based semantic score.
                    type: number
                type: object
              sourceObservation:
                description: SourceObservation is the observed source model telemetry
                  for the target app.
                properties:
                  errorRatePercent:
                    description: ErrorRatePercent is Errors / Requests * 100, serialized
                      as a decimal string.
                    type: string
                  errors:
                    description: Errors observed for the target app/model.
                    format: int64
                    type: integer
                  latencyTelemetryAvailable:
                    description: LatencyTelemetryAvailable is true when ObservedLatencyMillis
                      is real telemetry.
                    type: boolean
                  model:
                    description: Model is the provider-side model identifier.
                    type: string
                  observedLatencyMillis:
                    description: ObservedLatencyMillis is the measured mean latency
                      when telemetry exists.
                    type: string
                  provider:
                    description: Provider is the observed or catalogued provider for
                      the model.
                    type: string
                  requests:
                    description: Requests observed for the target app/model.
                    format: int64
                    type: integer
                type: object
              verdict:
                description: |-
                  Verdict is a stable machine-readable decision: candidate-safe,
                  candidate-risk or insufficient-data.
                type: string
              weightsUsed:
                description: WeightsUsed records normalized score weights.
                properties:
                  correctness:
                    type: number
                  judged:
                    type: number
                  latency:
                    type: number
                  reliability:
                    type: number
                  semantic:
                    type: number
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
