---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: airoutingpolicies.aiops.imperium.io
spec:
  group: aiops.imperium.io
  names:
    kind: AIRoutingPolicy
    listKind: AIRoutingPolicyList
    plural: airoutingpolicies
    shortNames:
    - airpolicy
    singular: airoutingpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.objective
      name: Objective
      type: string
    - jsonPath: .spec.canary.enabled
      name: Canary
      type: boolean
    - jsonPath: .status.recommendations
      name: Recommendations
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AIRoutingPolicy continuously evaluates all observed app/model pairs and surfaces
          the best routing candidate according to the multi-criteria routing score.
          Unlike AIRouteOverride (manual), it computes recommendations automatically and
          can create AIChangeRequest objects for human approval before actuation.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AIRoutingPolicySpec defines the desired automatic routing
              behaviour.
            properties:
              canary:
                description: |-
                  Canary configures the canary phase (declared intent; actuation is wired
                  through AIChangeRequest approval when human-in-the-loop is active).
                properties:
                  enabled:
                    description: Enabled requires canary validation before full reroute
                      (default false).
                    type: boolean
                  percent:
                    description: Percent of traffic to send to the candidate during
                      canary (1–50).
                    format: int32
                    maximum: 50
                    minimum: 1
                    type: integer
                type: object
              guardrails:
                description: Guardrails defines the minimum bar that any candidate
                  must clear.
                properties:
                  maxLatencyMillis:
                    description: |-
                      MaxLatencyMillis is the maximum measured mean latency (ms) allowed for a
                      candidate model. Models above this threshold are rejected.
                    format: int32
                    minimum: 0
                    type: integer
                  minQualityScore:
                    description: |-
                      MinQualityScore is the minimum routing score (0–1) a candidate model must
                      reach before it can be automatically selected (default 0.70).
                    maximum: 1
                    minimum: 0
                    type: number
                  requireSovereigntyCompliance:
                    default: true
                    description: |-
                      RequireSovereigntyCompliance, when true, restricts candidate selection to
                      sovereignty-compliant models only (default true).
                    type: boolean
                type: object
              objective:
                default: cost
                description: Objective is the primary optimisation dimension.
                enum:
                - cost
                - quality
                - latency
                type: string
            type: object
          status:
            description: AIRoutingPolicyStatus reflects the observed state of the
              routing policy.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the policy state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastEvaluatedAt:
                description: LastEvaluatedAt is when the routing engine last ran.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation last reconciled.
                format: int64
                type: integer
              recommendations:
                description: Recommendations lists candidates evaluated by the routing
                  engine.
                items:
                  description: AIRoutingPolicyRecommendation is one candidate model
                    the policy considers safe.
                  properties:
                    application:
                      description: Application is the workload/model pair evaluated.
                      type: string
                    blockReason:
                      description: BlockReason explains why the candidate was blocked
                        (empty when not blocked).
                      type: string
                    blocked:
                      description: Blocked is true when the candidate did not pass
                        the guardrails.
                      type: boolean
                    candidateModel:
                      description: CandidateModel is the model recommended by the
                        scoring engine.
                      type: string
                    candidateScore:
                      description: CandidateScore is the routing score of the candidate
                        (higher is better).
                      type: string
                    currentModel:
                      description: CurrentModel is the model currently used.
                      type: string
                    estimatedSavingsEUR:
                      description: EstimatedSavingsEUR is the projected saving of
                        switching over the observation window.
                      type: string
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
