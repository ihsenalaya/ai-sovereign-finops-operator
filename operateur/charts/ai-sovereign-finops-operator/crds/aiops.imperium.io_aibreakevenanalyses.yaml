  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: aibreakevenanalyses.aiops.imperium.io
spec:
  group: aiops.imperium.io
  names:
    kind: AIBreakEvenAnalysis
    listKind: AIBreakEvenAnalysisList
    plural: aibreakevenanalyses
    shortNames:
    - aibreakeven
    singular: aibreakevenanalysis
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.currentModelRef
      name: CurrentModel
      type: string
    - jsonPath: .status.recommendation
      name: Recommendation
      type: string
    - jsonPath: .status.paybackMonths
      name: Payback(mo)
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AIBreakEvenAnalysis compares managed-API cost vs self-hosted GPU cost and
          computes a break-even point.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AIBreakEvenAnalysisSpec defines the desired state of AIBreakEvenAnalysis.
            properties:
              alternativeSelfHosted:
                description: AlternativeSelfHosted is the self-hosting option to compare
                  against.
                properties:
                  estimatedOpsCostEUR:
                    anyOf:
                    - type: integer
                    - type: string
                    description: EstimatedOpsCostEUR is the recurring ops/MLOps cost
                      per month.
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  gpuCount:
                    default: 1
                    description: GpuCount is how many GPUs the deployment needs.
                    format: int32
                    minimum: 1
                    type: integer
                  gpuType:
                    description: GpuType is the GPU SKU (e.g. l40s, a100, h100).
                    type: string
                  migrationCostEUR:
                    anyOf:
                    - type: integer
                    - type: string
                    description: MigrationCostEUR is the one-off cost to migrate to
                      self-hosting.
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  modelName:
                    description: ModelName is the open-weights model to self-host
                      (e.g. llama-3-70b).
                    minLength: 1
                    type: string
                  monthlyGpuCostEUR:
                    anyOf:
                    - type: integer
                    - type: string
                    description: MonthlyGpuCostEUR is the recurring GPU/infra cost
                      per month.
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  runtime:
                    default: vllm
                    description: Runtime is the open-source inference server.
                    enum:
                    - vllm
                    - tgi
                    - ollama
                    - sglang
                    type: string
                  storageNetworkCostEUR:
                    anyOf:
                    - type: integer
                    - type: string
                    description: StorageNetworkCostEUR is the recurring storage/egress
                      cost per month.
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                required:
                - gpuCount
                - modelName
                - monthlyGpuCostEUR
                - runtime
                type: object
              analysisWindowDays:
                default: 30
                description: AnalysisWindowDays is the observation window for usage
                  extrapolation.
                format: int32
                minimum: 1
                type: integer
              currentModelRef:
                description: CurrentModelRef is the AIModel currently used via a managed
                  API.
                minLength: 1
                type: string
              target:
                description: Target scopes the workload being analyzed.
                properties:
                  application:
                    type: string
                  namespace:
                    type: string
                type: object
            required:
            - alternativeSelfHosted
            - analysisWindowDays
            - currentModelRef
            - target
            type: object
          status:
            description: AIBreakEvenAnalysisStatus defines the observed state of AIBreakEvenAnalysis.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the analysis state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              managedMonthlyCostEUR:
                anyOf:
                - type: integer
                - type: string
                description: ManagedMonthlyCostEUR is the extrapolated managed-API
                  monthly cost.
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
              monthlySavingsEUR:
                anyOf:
                - type: integer
                - type: string
                description: MonthlySavingsEUR is managed minus self-hosted (can be
                  negative).
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation last reconciled.
                format: int64
                type: integer
              paybackMonths:
                description: |-
                  PaybackMonths is migrationCost / monthlySavings, as a decimal string
                  (e.g. "4.2"); empty when savings are non-positive.
                type: string
              recommendation:
                description: Recommendation is the engine verdict.
                enum:
                - keep-managed
                - investigate
                - self-host
                type: string
              selfHostedMonthlyCostEUR:
                anyOf:
                - type: integer
                - type: string
                description: SelfHostedMonthlyCostEUR is the estimated self-hosting
                  monthly cost.
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
            type: object
        type: object
    served: true
    storage: true
    subresources:
