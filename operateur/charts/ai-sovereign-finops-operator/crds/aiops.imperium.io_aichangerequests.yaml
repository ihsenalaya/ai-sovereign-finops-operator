---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: aichangerequests.aiops.imperium.io
spec:
  group: aiops.imperium.io
  names:
    kind: AIChangeRequest
    listKind: AIChangeRequestList
    plural: aichangerequests
    shortNames:
    - aicrq
    singular: aichangerequest
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.action
      name: Action
      type: string
    - jsonPath: .spec.sourceModel
      name: Source
      type: string
    - jsonPath: .spec.targetModel
      name: Target
      type: string
    - jsonPath: .spec.approval
      name: Approval
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.riskLevel
      name: Risk
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: "AIChangeRequest represents a proposed model routing change that
          requires\nhuman approval before the operator actuates it. The workflow is:\n\n\tPending
          → Approved (human sets spec.approval=Approved) → Actuated\n\tPending → Rejected
          (human sets spec.approval=Rejected)\n\tPending → Expired  (expiresAfter
          elapsed without decision)\n\nEvery decision is auditable via status conditions
          and Kubernetes Events."
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AIChangeRequestSpec describes a proposed change for human
              review.
            properties:
              action:
                description: Action is the type of change proposed.
                enum:
                - reroute
                type: string
              approval:
                default: Pending
                description: |-
                  Approval is set by a human reviewer to approve or reject the request.
                  Initially left empty (Pending). The operator acts only when Approved.
                enum:
                - Pending
                - Approved
                - Rejected
                type: string
              expectedSavingEUR:
                description: ExpectedSavingEUR is the projected saving over the observation
                  window.
                type: string
              expiresAfter:
                description: |-
                  ExpiresAfter is how long this request waits for approval before it expires
                  (e.g. "24h"). Defaults to "48h" when not set.
                type: string
              latencyImpact:
                description: LatencyImpact is a human-readable estimated latency delta
                  (e.g. "+120ms").
                type: string
              qualityScore:
                description: QualityScore is the routing score of the target model
                  at proposal time.
                type: string
              reason:
                description: Reason is a human-readable justification for the change.
                type: string
              riskLevel:
                description: RiskLevel is the operator's assessment of the change
                  risk.
                enum:
                - low
                - medium
                - high
                type: string
              sourceModel:
                description: SourceModel is the current provider-side model id.
                minLength: 1
                type: string
              targetModel:
                description: TargetModel is the proposed replacement model id.
                minLength: 1
                type: string
            required:
            - action
            - sourceModel
            - targetModel
            type: object
          status:
            description: AIChangeRequestStatus reflects the observed state of the
              change request.
            properties:
              actuatedAt:
                description: ActuatedAt is when the operator applied the change.
                format: date-time
                type: string
              actuatedRoutes:
                description: ActuatedRoutes lists the AIGatewayRoute names modified
                  by this request.
                items:
                  type: string
                type: array
              conditions:
                description: Conditions represent the latest available observations
                  of the request state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              expiresAt:
                description: ExpiresAt is when the request will automatically expire
                  if not acted upon.
                format: date-time
                type: string
              message:
                description: Message is a human-readable description of the current
                  phase.
                type: string
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation last reconciled.
                format: int64
                type: integer
              phase:
                description: Phase is the current lifecycle state of the request.
                enum:
                - Pending
                - Approved
                - Actuated
                - Rejected
                - Expired
                - Failed
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
