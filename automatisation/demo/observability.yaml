# Lean observability stack for the demo: a single Prometheus scraping the
# operator's /metrics, and a single Grafana with the AI-FinOps dashboard
# auto-provisioned. Intentionally minimal (low resources) to fit a small kind
# cluster — this is a demo, not a production monitoring stack.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-prometheus-config
  namespace: greenops-system
  labels: { app: demo-prometheus, aiops.imperium.io/demo: "true" }
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
    scrape_configs:
      - job_name: ai-finops-operator
        static_configs:
          - targets:
              - greenops-ai-sovereign-finops-operator-metrics.greenops-system.svc.cluster.local:8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-prometheus
  namespace: greenops-system
  labels: { app: demo-prometheus, aiops.imperium.io/demo: "true" }
spec:
  replicas: 1
  selector: { matchLabels: { app: demo-prometheus } }
  template:
    metadata:
      labels: { app: demo-prometheus, aiops.imperium.io/demo: "true" }
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time=2h
          ports: [{ containerPort: 9090 }]
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          volumeMounts:
            - { name: config, mountPath: /etc/prometheus }
      volumes:
        - name: config
          configMap: { name: demo-prometheus-config }
---
apiVersion: v1
kind: Service
metadata:
  name: demo-prometheus
  namespace: greenops-system
  labels: { app: demo-prometheus, aiops.imperium.io/demo: "true" }
spec:
  selector: { app: demo-prometheus }
  ports: [{ port: 9090, targetPort: 9090 }]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-grafana-provisioning
  namespace: greenops-system
  labels: { app: demo-grafana, aiops.imperium.io/demo: "true" }
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://demo-prometheus.greenops-system.svc.cluster.local:9090
        isDefault: true
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: ai-finops
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-grafana
  namespace: greenops-system
  labels: { app: demo-grafana, aiops.imperium.io/demo: "true" }
spec:
  replicas: 1
  selector: { matchLabels: { app: demo-grafana } }
  template:
    metadata:
      labels: { app: demo-grafana, aiops.imperium.io/demo: "true" }
    spec:
      containers:
        - name: grafana
          # Custom image with volkovlabs-echarts-panel pre-installed (radar chart).
          # Published to GHCR by the release workflow; deploy.sh can preload it into kind.
          image: ghcr.io/ihsenalaya/ai-sovereign-finops-grafana-radar:11.2.2-echarts6.6.0
          imagePullPolicy: IfNotPresent
          env:
            # Anonymous admin so the demo opens straight to the dashboard.
            - { name: GF_AUTH_ANONYMOUS_ENABLED, value: "true" }
            - { name: GF_AUTH_ANONYMOUS_ORG_ROLE, value: "Admin" }
            - { name: GF_SECURITY_ADMIN_PASSWORD, value: "admin" }
            - { name: GF_USERS_DEFAULT_THEME, value: "dark" }
          ports: [{ containerPort: 3000 }]
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 384Mi }
          volumeMounts:
            - { name: provisioning-ds, mountPath: /etc/grafana/provisioning/datasources }
            - { name: provisioning-dash, mountPath: /etc/grafana/provisioning/dashboards }
            - { name: dashboards, mountPath: /var/lib/grafana/dashboards }
      volumes:
        - name: provisioning-ds
          configMap:
            name: demo-grafana-provisioning
            items: [{ key: datasource.yaml, path: datasource.yaml }]
        - name: provisioning-dash
          configMap:
            name: demo-grafana-provisioning
            items: [{ key: dashboards.yaml, path: dashboards.yaml }]
        - name: dashboards
          configMap: { name: demo-grafana-dashboard }   # created by demo.sh from operateur/dashboards/ai-finops-overview.json
---
apiVersion: v1
kind: Service
metadata:
  name: demo-grafana
  namespace: greenops-system
  labels: { app: demo-grafana, aiops.imperium.io/demo: "true" }
spec:
  selector: { app: demo-grafana }
  ports: [{ port: 3000, targetPort: 3000 }]
