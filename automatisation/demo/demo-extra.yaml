# Extra CRs that round out the demo on top of config/samples:
#  - a report over ALL flows (no namespace filter) so the forbidden finance->US
#    flow surfaces with full per-flow attribution, and the monthly run-rate
#    forecast covers every namespace;
#  - a deliberately tight budget on the rh namespace whose FORECAST monthly spend
#    (~34 EUR run-rate) exceeds the 25 EUR monthly cap, showing the budget engine
#    flag an over-budget trajectory + graceful degradation to the fallback model.
# Observation window = daily everywhere; the operator forecasts the month.
---
apiVersion: aiops.imperium.io/v1alpha1
kind: AIFinOpsReport
metadata:
  name: all-flows-report
  namespace: default
  labels: { aiops.imperium.io/demo: "true" }
spec:
  target:
    period: daily
---
apiVersion: aiops.imperium.io/v1alpha1
kind: AIBudgetPolicy
metadata:
  name: rh-tight-budget
  namespace: default
  labels: { aiops.imperium.io/demo: "true" }
spec:
  target:
    namespace: rh
    team: rh
    application: chatbot-rh
  period: daily          # daily observation; budgetEUR is the monthly cap
  budgetEUR: 25          # forecast monthly rh spend (~34 EUR run-rate) exceeds this on purpose
  warningThresholdPercent: 70
  criticalThresholdPercent: 90
  hardLimitPercent: 100
  actions:
    onWarning: [alert]
    onCritical: [enableCache, routeToCheaperModel]
    onHardLimit: [blockOrRequireApproval]
  fallbackModelRef: mistral-large
