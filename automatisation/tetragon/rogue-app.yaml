# A deliberately non-compliant "shadow-AI" workload: it calls OpenAI (US) DIRECTLY,
# bypassing the Envoy AI Gateway entirely. The gateway-based collectors can't see it
# — only the eBPF (Tetragon) sovereignty plane catches it. Use it to demo that
# greenops flags shadow-AI. It needs no API key (the TLS connect alone is what the
# egress plane observes); the request can 401 and the detection still fires.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shadow-ai-rogue
  namespace: finance
  labels:
    app: rogue-script
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rogue-script
  template:
    metadata:
      labels:
        app: rogue-script
      annotations:
        aiops.imperium.io/sidecar-injection: "false"
    spec:
      containers:
        - name: caller
          image: curlimages/curl:8.10.1
          # Hit OpenAI (US) directly a bounded number of times. This uses no API
          # key and the 401/connection itself is the real egress evidence.
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              attempts="${ATTEMPT_LIMIT:-4}"
              i=0
              while [ "$i" -lt "$attempts" ]; do
                i=$((i + 1))
                code="$(curl -s -o /dev/null -w "%{http_code}" -m 10 https://api.openai.com/v1/models || true)"
                [ -n "$code" ] || code="000"
                echo "finance/rogue-script(api.openai.com): $code"
                [ "$i" -ge "$attempts" ] && break
                sleep "${ATTEMPT_SLEEP_SECONDS:-5}"
              done
              echo "finance/rogue-script(api.openai.com): attempts=$i; idling"
              tail -f /dev/null
          env:
            - { name: ATTEMPT_LIMIT, value: "4" }
            - { name: ATTEMPT_SLEEP_SECONDS, value: "5" }
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
