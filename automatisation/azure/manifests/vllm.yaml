# vLLM OpenAI-compatible server on a GPU node. Placeholders (__MODEL__, etc.) are
# substituted by 04-deploy-vllm.sh. Triggers GPU node autoscale 0->1 on schedule.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: vllm
  labels: { app: vllm }
spec:
  replicas: 1
  selector:
    matchLabels: { app: vllm }
  template:
    metadata:
      labels: { app: vllm }
    spec:
      nodeSelector:
        sku: gpu
      tolerations:
        - key: sku
          operator: Equal
          value: gpu
          effect: NoSchedule
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          command: ["/bin/sh", "-c"]
          args:
            - 'vllm serve "__MODEL__" --served-model-name "__SERVED__" --host 0.0.0.0 --port 8000 __EXTRA_ARGS__'
          ports:
            - { name: http, containerPort: 8000 }
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          resources:
            limits:
              nvidia.com/gpu: 1
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 60
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: vllm
  labels: { app: vllm }
spec:
  selector: { app: vllm }
  ports:
    - name: http
      port: 8000
      targetPort: 8000
