# Lean single-node kind cluster for the AI Sovereign FinOps Operator demo.
# Kept minimal to fit RAM-constrained machines (e.g. WSL2 ~7 GiB).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: greenops
nodes:
  - role: control-plane
    extraPortMappings:
      # ArgoCD UI
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      # In-cluster Gitea (Git server) HTTP — used to seed the repo from the host
      - containerPort: 30083
        hostPort: 30083
        protocol: TCP
