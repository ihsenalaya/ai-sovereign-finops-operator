# AI Quality Score real-evaluation gates for the Kind/Azure demo.
# These ConfigMaps contain only golden prompts. The evidence ConfigMaps named in
# evidenceRef are intentionally absent at apply time: AIQualityGate creates a
# Kubernetes Job that calls the production Envoy AI Gateway path and writes real
# source/candidate outputs back to evidenceRef before scoring.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: finance-quality-golden
  namespace: default
  labels: { app.kubernetes.io/name: ai-sovereign-finops-operator }
data:
  prompts.yaml: |
    - id: counterparty-risk
      prompt: "Summarize key counterparty risks for a new supplier in one concise paragraph and explicitly include: counterparty, liquidity, risk."
      expected:
        reference: "Counterparty risk includes liquidity exposure and operational risk."
        requiredKeywords: ["counterparty", "liquidity", "risk"]
        maxTokens: 80
---
apiVersion: aiops.imperium.io/v1alpha1
kind: AIQualityGate
metadata:
  name: finance-risk-assistant-quality
  namespace: default
  labels: { app.kubernetes.io/name: ai-sovereign-finops-operator }
spec:
  target: { namespace: finance, team: finance, application: risk-assistant }
  sourceModel: gpt-france-mini
  candidateModel: mistral-large-latest
  goldenDatasetRef: { name: finance-quality-golden }
  evidenceRef: { name: finance-quality-evidence }
  gatewayRef: main-gateway
  latencyThresholdMs: 3000
  minSamples: 1
  tolerancePoints: 3
  evaluation:
    endpoint: http://greenops-aigw.envoy-gateway-system.svc.cluster.local:80/v1/chat/completions
    maxTokens: 80
    timeoutSeconds: 60
  weights:
    judged: 0
---
