# Provider 3 — Azure OpenAI France Central (greenops-fr-ec0e82-06181356.openai.azure.com)
# Deployment: gpt-france-mini (gpt-4.1-mini, Standard SKU = données traitées en France)
# Zone: FR → CONFORME à la politique regulated-france-policy
# Apps: rh/chatbot-rh + legal/contract-review
---
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: AIGatewayRoute
metadata:
  name: greenops-openai-fr
  namespace: default
spec:
  parentRefs:
    - name: greenops-aigw
      kind: Gateway
      group: gateway.networking.k8s.io
  rules:
    - matches:
        - headers:
            - type: Exact
              name: x-ai-eg-model
              value: gpt-france-mini
      backendRefs:
        - name: greenops-openai-fr
---
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: AIServiceBackend
metadata:
  name: greenops-openai-fr
  namespace: default
spec:
  schema:
    name: AzureOpenAI
    version: "2024-05-01-preview"
  backendRef:
    name: greenops-openai-fr
    kind: Backend
    group: gateway.envoyproxy.io
---
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: BackendSecurityPolicy
metadata:
  name: greenops-openai-fr-apikey
  namespace: default
spec:
  targetRefs:
    - group: aigateway.envoyproxy.io
      kind: AIServiceBackend
      name: greenops-openai-fr
  type: APIKey
  apiKey:
    secretRef:
      name: greenops-openai-fr-apikey
      namespace: default
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: greenops-openai-fr
  namespace: default
spec:
  endpoints:
    - fqdn:
        hostname: greenops-fr-ec0e82-06181356.openai.azure.com
        port: 443
---
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: greenops-openai-fr-tls
  namespace: default
spec:
  targetRefs:
    - group: gateway.envoyproxy.io
      kind: Backend
      name: greenops-openai-fr
  validation:
    wellKnownCACertificates: "System"
    hostname: greenops-fr-ec0e82-06181356.openai.azure.com
---
# Catalogue : provider France (zone FR) → AUCUNE violation de souveraineté.
apiVersion: aiops.imperium.io/v1alpha1
kind: AIProvider
metadata:
  name: openai-fr
  namespace: default
  labels: { app.kubernetes.io/name: ai-sovereign-finops-operator }
spec:
  type: azure-openai
  region: francecentral
  dataResidency: fr
  managed: true
  # gpt-4.1-mini Azure OpenAI Standard (USD 0.40/1.60 per 1M tokens → EUR ×0.92)
  pricing: { currency: EUR, inputTokenPricePerMillion: "0.37", outputTokenPricePerMillion: "1.47" }
  compliance: { allowedForSensitiveData: true, allowedCountries: [FR, EU] }
---
apiVersion: aiops.imperium.io/v1alpha1
kind: AIModel
metadata:
  name: gpt-france-mini
  namespace: default
  labels: { app.kubernetes.io/name: ai-sovereign-finops-operator }
spec:
  providerRef: openai-fr
  modelName: gpt-france-mini
  type: llm
  qualityTier: high
  costTier: low
  sensitiveDataAllowed: true
  servesNamespace: rh
  servesApplication: chatbot-rh
  servesTeam: rh
---
# Apps rh + legal appellent gpt-france-mini (Azure OpenAI France → souverain)
apiVersion: v1
kind: Namespace
metadata:
  name: rh
  labels:
    aiops.imperium.io/sidecar-injection: "true"
---
apiVersion: v1
kind: Namespace
metadata:
  name: legal
  labels:
    aiops.imperium.io/sidecar-injection: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-rh
  namespace: rh
  labels: { app: chatbot-rh, aiops.imperium.io/demo: "true" }
spec:
  replicas: 1
  selector: { matchLabels: { app: chatbot-rh } }
  template:
    metadata:
      labels: { app: chatbot-rh, aiops.imperium.io/demo: "true" }
      annotations:
        aiops.imperium.io/target-hosts: greenops-aigw.envoy-gateway-system.svc.cluster.local
    spec:
      containers:
        - name: client
          image: curlimages/curl:8.10.1
          resources: { requests: { cpu: 10m, memory: 16Mi }, limits: { cpu: 100m, memory: 64Mi } }
          env:
            - { name: GATEWAY, value: "http://greenops-aigw.envoy-gateway-system.svc.cluster.local:80/v1/chat/completions" }
            - { name: MODEL, value: "gpt-france-mini" }
            - { name: APP, value: "chatbot-rh" }
            - { name: SUCCESS_TARGET, value: "999" }
            - { name: ATTEMPT_LIMIT, value: "5" }
            - { name: ATTEMPT_SLEEP_SECONDS, value: "15" }
            - { name: START_DELAY_SECONDS, value: "20" }
            - name: NS
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              PROMPTS='Explique la politique de conges en une phrase.|Redige un accueil pour un nouvel employe.|Comment soumettre une note de frais ?'
              sleep "${START_DELAY_SECONDS:-20}"
              attempt=0; success=0
              while [ "$attempt" -lt "${ATTEMPT_LIMIT:-5}" ] && [ "$success" -lt "${SUCCESS_TARGET:-999}" ]; do
                attempt=$((attempt + 1))
                P=$(echo "$PROMPTS" | tr '|' '\n' | sed -n "$(( (attempt % 3) + 1 ))p")
                code="$(curl -s -m 60 -o /dev/null -w "%{http_code}" \
                  -H 'Content-Type: application/json' \
                  -d "{\"model\":\"$MODEL\",\"messages\":[{\"role\":\"user\",\"content\":\"$P\"}],\"max_tokens\":150}" \
                  "$GATEWAY" || true)"
                [ -n "$code" ] || code="000"
                echo "$NS/$APP($MODEL): $code"
                case "$code" in 2*) success=$((success + 1));; esac
                [ "$success" -ge "${SUCCESS_TARGET:-999}" ] && break
                sleep "${ATTEMPT_SLEEP_SECONDS:-15}"
              done
              echo "$NS/$APP($MODEL): successes=$success attempts=$attempt; idling"
              tail -f /dev/null
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: contract-review
  namespace: legal
  labels: { app: contract-review, aiops.imperium.io/demo: "true" }
spec:
  replicas: 1
  selector: { matchLabels: { app: contract-review } }
  template:
    metadata:
      labels: { app: contract-review, aiops.imperium.io/demo: "true" }
      annotations:
        aiops.imperium.io/target-hosts: greenops-aigw.envoy-gateway-system.svc.cluster.local
    spec:
      containers:
        - name: client
          image: curlimages/curl:8.10.1
          resources: { requests: { cpu: 10m, memory: 16Mi }, limits: { cpu: 100m, memory: 64Mi } }
          env:
            - { name: GATEWAY, value: "http://greenops-aigw.envoy-gateway-system.svc.cluster.local:80/v1/chat/completions" }
            - { name: MODEL, value: "gpt-france-mini" }
            - { name: APP, value: "contract-review" }
            - { name: SUCCESS_TARGET, value: "999" }
            - { name: ATTEMPT_LIMIT, value: "5" }
            - { name: ATTEMPT_SLEEP_SECONDS, value: "15" }
            - { name: START_DELAY_SECONDS, value: "60" }
            - name: NS
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              PROMPTS='Summarize the liability clauses of a SaaS contract.|List risks in an auto-renewal clause.|Explain an indemnification clause simply.'
              sleep "${START_DELAY_SECONDS:-60}"
              attempt=0; success=0
              while [ "$attempt" -lt "${ATTEMPT_LIMIT:-5}" ] && [ "$success" -lt "${SUCCESS_TARGET:-999}" ]; do
                attempt=$((attempt + 1))
                P=$(echo "$PROMPTS" | tr '|' '\n' | sed -n "$(( (attempt % 3) + 1 ))p")
                code="$(curl -s -m 60 -o /dev/null -w "%{http_code}" \
                  -H 'Content-Type: application/json' \
                  -d "{\"model\":\"$MODEL\",\"messages\":[{\"role\":\"user\",\"content\":\"$P\"}],\"max_tokens\":200}" \
                  "$GATEWAY" || true)"
                [ -n "$code" ] || code="000"
                echo "$NS/$APP($MODEL): $code"
                case "$code" in 2*) success=$((success + 1));; esac
                [ "$success" -ge "${SUCCESS_TARGET:-999}" ] && break
                sleep "${ATTEMPT_SLEEP_SECONDS:-15}"
              done
              echo "$NS/$APP($MODEL): successes=$success attempts=$attempt; idling"
              tail -f /dev/null
---
apiVersion: aiops.imperium.io/v1alpha1
kind: AIBudgetPolicy
metadata:
  name: rh-budget
  namespace: default
  labels: { app.kubernetes.io/name: ai-sovereign-finops-operator }
spec:
  target: { namespace: rh, team: rh, application: chatbot-rh }
  period: monthly
  budgetEUR: "0.20"
  warningThresholdPercent: 70
  criticalThresholdPercent: 90
  hardLimitPercent: 100
  actions: { onWarning: [alert], onCritical: [alert], onHardLimit: [blockOrRequireApproval] }
---
apiVersion: aiops.imperium.io/v1alpha1
kind: AIBudgetPolicy
metadata:
  name: legal-budget
  namespace: default
  labels: { app.kubernetes.io/name: ai-sovereign-finops-operator }
spec:
  target: { namespace: legal, team: legal, application: contract-review }
  period: monthly
  budgetEUR: "0.20"
  warningThresholdPercent: 70
  criticalThresholdPercent: 90
  hardLimitPercent: 100
  actions: { onWarning: [alert], onCritical: [alert], onHardLimit: [blockOrRequireApproval] }
