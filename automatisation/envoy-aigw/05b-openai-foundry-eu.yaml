# Optional third compliant QualityScore provider: GPT-4.1 Mini on Azure AI
# Foundry, EU data zone. This file is applied only after deploy.sh proves that
# the deployment answers through the real Foundry endpoint.
#
# Foundry endpoint:  https://greenops-foundry.services.ai.azure.com
# deployment:        gpt-foundry-eu-mini (gpt-4.1-mini, DataZoneStandard = EU)
# auth:              same Foundry key as Cohere/Mistral, held in a Kubernetes Secret
---
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: AIGatewayRoute
metadata:
  name: greenops-openai-foundry-eu
  namespace: default
spec:
  parentRefs:
    - name: greenops-aigw
      kind: Gateway
      group: gateway.networking.k8s.io
  rules:
    - matches:
        - headers:
            - type: Exact
              name: x-ai-eg-model
              value: gpt-foundry-eu-mini
      backendRefs:
        - name: greenops-openai-foundry-eu
---
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: AIServiceBackend
metadata:
  name: greenops-openai-foundry-eu
  namespace: default
spec:
  schema:
    name: AzureOpenAI
    version: "2024-05-01-preview"
  backendRef:
    name: greenops-openai-foundry-eu
    kind: Backend
    group: gateway.envoyproxy.io
---
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: BackendSecurityPolicy
metadata:
  name: greenops-openai-foundry-eu-apikey
  namespace: default
spec:
  targetRefs:
    - group: aigateway.envoyproxy.io
      kind: AIServiceBackend
      name: greenops-openai-foundry-eu
  type: APIKey
  apiKey:
    secretRef:
      name: greenops-foundry-apikey
      namespace: default
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: greenops-openai-foundry-eu
  namespace: default
spec:
  endpoints:
    - fqdn:
        hostname: greenops-foundry.services.ai.azure.com
        port: 443
---
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: greenops-openai-foundry-eu-tls
  namespace: default
spec:
  targetRefs:
    - group: gateway.envoyproxy.io
      kind: Backend
      name: greenops-openai-foundry-eu
  validation:
    wellKnownCACertificates: "System"
    hostname: greenops-foundry.services.ai.azure.com
---
apiVersion: aiops.imperium.io/v1alpha1
kind: AIProvider
metadata:
  name: openai-foundry-eu
  namespace: default
  labels: { app.kubernetes.io/name: ai-sovereign-finops-operator }
spec:
  type: azure-openai
  region: francecentral
  dataResidency: eu
  managed: true
  # GPT-4.1 Mini list price (USD 0.40/1.60 per 1M tokens -> EUR x0.92).
  pricing: { currency: EUR, inputTokenPricePerMillion: "0.37", outputTokenPricePerMillion: "1.47" }
  compliance: { allowedForSensitiveData: true, allowedCountries: [FR] }
---
apiVersion: aiops.imperium.io/v1alpha1
kind: AIModel
metadata:
  name: gpt-foundry-eu-mini
  namespace: default
  labels: { app.kubernetes.io/name: ai-sovereign-finops-operator }
spec:
  providerRef: openai-foundry-eu
  modelName: gpt-foundry-eu-mini
  type: llm
  qualityTier: high
  costTier: low
  sensitiveDataAllowed: true
  servesNamespace: finance
  servesApplication: risk-assistant
  servesTeam: finance
