# Stable data-path Service for the Envoy AI Gateway + REAL consumer apps that
# make a bounded number of real calls through the gateway. The operator's mutating webhook
# injects a sidecar HTTP proxy into opted-in namespaces; that proxy adds the
# `x-greenops-namespace` / `x-greenops-app` headers automatically, so token cost
# is attributed PER NAMESPACE / APP even when two apps in different namespaces
# use the SAME model. No API key in the apps — the gateway holds it.
#
# All three apps use the same live non-French model
# (`cohere-command-a-latest`) and are still attributed separately by
# namespace/app. `finance/risk-assistant` is simply the busiest app, so its
# budget phase advances fastest.
---
apiVersion: v1
kind: Service
metadata:
  name: greenops-aigw
  namespace: envoy-gateway-system
  labels: { app: greenops-aigw }
spec:
  selector:
    gateway.envoyproxy.io/owning-gateway-name: greenops-aigw
  ports:
    - { name: http, port: 80, targetPort: 10080 }
---
apiVersion: v1
kind: Namespace
metadata:
  name: rh
  labels:
    aiops.imperium.io/sidecar-injection: "true"
---
apiVersion: v1
kind: Namespace
metadata:
  name: finance
  labels:
    aiops.imperium.io/sidecar-injection: "true"
---
apiVersion: v1
kind: Namespace
metadata:
  name: legal
  labels:
    aiops.imperium.io/sidecar-injection: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-rh
  namespace: rh
  labels: { app: chatbot-rh, aiops.imperium.io/demo: "true" }
spec:
  replicas: 1
  selector: { matchLabels: { app: chatbot-rh } }
  template:
    metadata:
      labels: { app: chatbot-rh, aiops.imperium.io/demo: "true" }
      annotations:
        aiops.imperium.io/target-hosts: greenops-aigw.envoy-gateway-system.svc.cluster.local
    spec:
      containers:
        - name: client
          image: curlimages/curl:8.10.1
          resources: { requests: { cpu: 10m, memory: 16Mi }, limits: { cpu: 100m, memory: 64Mi } }
          env:
            - { name: GATEWAY, value: "http://greenops-aigw.envoy-gateway-system.svc.cluster.local:80/v1/chat/completions" }
            - { name: MODEL, value: "cohere-command-a-latest" }
            - { name: APP, value: "chatbot-rh" }
            - { name: SUCCESS_TARGET, value: "1" }
            - { name: ATTEMPT_LIMIT, value: "4" }
            - { name: ATTEMPT_SLEEP_SECONDS, value: "15" }
            - { name: START_DELAY_SECONDS, value: "20" }
            - name: NS
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              PROMPTS='Explique la politique de conges en une phrase.|Redige un accueil pour un nouvel employe.|Comment soumettre une note de frais ?'
              sleep "${START_DELAY_SECONDS:-20}"
              attempt=0
              success=0
              while [ "$attempt" -lt "${ATTEMPT_LIMIT:-4}" ] && [ "$success" -lt "${SUCCESS_TARGET:-1}" ]; do
                attempt=$((attempt + 1))
                P=$(echo "$PROMPTS" | tr '|' '\n' | sed -n "$(( (attempt % 3) + 1 ))p")
                code="$(curl -s -m 60 -o /dev/null -w "%{http_code}" \
                  -H 'Content-Type: application/json' \
                  -d "{\"model\":\"$MODEL\",\"messages\":[{\"role\":\"user\",\"content\":\"$P\"}],\"max_tokens\":220}" \
                  "$GATEWAY" || true)"
                [ -n "$code" ] || code="000"
                echo "$NS/$APP($MODEL): $code"
                case "$code" in 2*) success=$((success + 1));; esac
                [ "$success" -ge "${SUCCESS_TARGET:-1}" ] && break
                sleep "${ATTEMPT_SLEEP_SECONDS:-15}"
              done
              echo "$NS/$APP($MODEL): successes=$success attempts=$attempt; idling"
              tail -f /dev/null
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-assistant
  namespace: finance
  labels: { app: risk-assistant, aiops.imperium.io/demo: "true" }
spec:
  replicas: 1
  selector: { matchLabels: { app: risk-assistant } }
  template:
    metadata:
      labels: { app: risk-assistant, aiops.imperium.io/demo: "true" }
      annotations:
        aiops.imperium.io/target-hosts: greenops-aigw.envoy-gateway-system.svc.cluster.local
    spec:
      containers:
        - name: client
          image: curlimages/curl:8.10.1
          resources: { requests: { cpu: 10m, memory: 16Mi }, limits: { cpu: 100m, memory: 64Mi } }
          env:
            - { name: GATEWAY, value: "http://greenops-aigw.envoy-gateway-system.svc.cluster.local:80/v1/chat/completions" }
            - { name: MODEL, value: "cohere-command-a-latest" }
            - { name: APP, value: "risk-assistant" }
            - { name: SUCCESS_TARGET, value: "1" }
            - { name: ATTEMPT_LIMIT, value: "4" }
            - { name: ATTEMPT_SLEEP_SECONDS, value: "15" }
            - { name: START_DELAY_SECONDS, value: "85" }
            - name: NS
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              PROMPTS='Summarize key counterparty risks for a new supplier.|List three liquidity-risk indicators.|Explain value-at-risk in two sentences.'
              sleep "${START_DELAY_SECONDS:-85}"
              attempt=0
              success=0
              while [ "$attempt" -lt "${ATTEMPT_LIMIT:-4}" ] && [ "$success" -lt "${SUCCESS_TARGET:-1}" ]; do
                attempt=$((attempt + 1))
                P=$(echo "$PROMPTS" | tr '|' '\n' | sed -n "$(( (attempt % 3) + 1 ))p")
                code="$(curl -s -m 60 -o /dev/null -w "%{http_code}" \
                  -H 'Content-Type: application/json' \
                  -d "{\"model\":\"$MODEL\",\"messages\":[{\"role\":\"user\",\"content\":\"$P\"}],\"max_tokens\":320}" \
                  "$GATEWAY" || true)"
                [ -n "$code" ] || code="000"
                echo "$NS/$APP($MODEL): $code"
                case "$code" in 2*) success=$((success + 1));; esac
                [ "$success" -ge "${SUCCESS_TARGET:-1}" ] && break
                sleep "${ATTEMPT_SLEEP_SECONDS:-15}"
              done
              echo "$NS/$APP($MODEL): successes=$success attempts=$attempt; idling"
              tail -f /dev/null
---
# Same model as rh and finance but a different namespace -> proves
# per-namespace attribution works even on a shared model.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: contract-review
  namespace: legal
  labels: { app: contract-review, aiops.imperium.io/demo: "true" }
spec:
  replicas: 1
  selector: { matchLabels: { app: contract-review } }
  template:
    metadata:
      labels: { app: contract-review, aiops.imperium.io/demo: "true" }
      annotations:
        aiops.imperium.io/target-hosts: greenops-aigw.envoy-gateway-system.svc.cluster.local
    spec:
      containers:
        - name: client
          image: curlimages/curl:8.10.1
          resources: { requests: { cpu: 10m, memory: 16Mi }, limits: { cpu: 100m, memory: 64Mi } }
