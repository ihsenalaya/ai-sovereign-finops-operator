# Stable metrics Service for the Envoy AI Gateway extproc (gen_ai_* token
# metrics on :1064) + the greenops catalog wired to read it.
---
apiVersion: v1
kind: Service
metadata:
  name: greenops-aigw-metrics
  namespace: envoy-gateway-system
  labels: { app: greenops-aigw-metrics }
spec:
  selector:
    gateway.envoyproxy.io/owning-gateway-name: greenops-aigw
  ports:
    - name: metrics
      port: 1064
      targetPort: 1064
---
# AIGateway: read REAL token usage from the Envoy AI Gateway metrics endpoint.
apiVersion: aiops.imperium.io/v1alpha1
kind: AIGateway
metadata:
  name: main-gateway
  namespace: default
  labels: { app.kubernetes.io/name: ai-sovereign-finops-operator }
spec:
  type: envoy
  endpoint: http://greenops-aigw-metrics.envoy-gateway-system.svc.cluster.local:1064
  telemetry:
    mode: aigw
    metricsEndpoint: /metrics
---
# One real non-French Azure Foundry deployment, priced with the official Azure
# list price and converted to EUR with the ECB USD/EUR daily rate on 2026-06-12
# (1 EUR = 1.1567 USD, so 1 USD = 0.8645 EUR).
apiVersion: aiops.imperium.io/v1alpha1
kind: AIProvider
metadata:
  name: cohere-global
  namespace: default
  labels: { app.kubernetes.io/name: ai-sovereign-finops-operator }
spec:
  type: azure-openai
  region: francecentral
  dataResidency: global
  managed: true
  # Azure pricing page: Cohere Command A Global = USD 0.0025 / 0.01 per 1K
  # tokens => EUR 2.16 / 8.65 per 1M tokens with the ECB rate above.
  pricing: { currency: EUR, inputTokenPricePerMillion: "2.16", outputTokenPricePerMillion: "8.65" }
  compliance: { allowedForSensitiveData: false }
---
apiVersion: aiops.imperium.io/v1alpha1
kind: AIModel
metadata:
  name: cohere-command-a
  namespace: default
  labels: { app.kubernetes.io/name: ai-sovereign-finops-operator }
spec:
  providerRef: cohere-global
  modelName: cohere-command-a-latest
  type: llm
  qualityTier: high
  costTier: high
  sensitiveDataAllowed: false
  # Default attribution only; real per-request namespace/app comes from the
  # sidecar-injected headers that AI Gateway exports as metric labels.
  servesNamespace: finance
  servesApplication: risk-assistant
  servesTeam: finance
---
# Regulated policy: EU/FR only. The live Cohere deployment uses Azure Foundry's
# GlobalStandard SKU, which Microsoft documents as "may be processed in any
# Azure region"; we therefore encode it as GLOBAL and forbid it explicitly for
# this regulated demo.
apiVersion: aiops.imperium.io/v1alpha1
kind: AISovereigntyPolicy
metadata:
  name: regulated-france-policy
  namespace: default
  labels: { app.kubernetes.io/name: ai-sovereign-finops-operator }
spec:
  dataResidency: { allowedZones: [FR, EU], forbiddenZones: [US, CN, GLOBAL] }
  sensitiveData: { externalProvidersAllowed: false, requireAnonymization: true }
  enforcementMode: reportOnly
---
# Daily observation; operator forecasts the month (run-rate).
apiVersion: aiops.imperium.io/v1alpha1
kind: AIFinOpsReport
metadata:
  name: ai-report-all
  namespace: default
  labels: { app.kubernetes.io/name: ai-sovereign-finops-operator }
spec:
  target: { period: monthly }
  gatewayRef: main-gateway
---
apiVersion: aiops.imperium.io/v1alpha1
kind: AIBudgetPolicy
metadata:
  name: finance-budget
  namespace: default
  labels: { app.kubernetes.io/name: ai-sovereign-finops-operator }
spec:
  target: { namespace: finance, team: finance, application: risk-assistant }
  period: monthly
  # Tight real cap so the live demo reaches Critical/Exceeded in a couple of
  # minutes from real traffic. No fake fallback is configured: only one
  # non-French live deployment exists in this Foundry account today.
  budgetEUR: "0.02"
  warningThresholdPercent: 70
  criticalThresholdPercent: 90
  hardLimitPercent: 100
  actions: { onWarning: [alert], onCritical: [alert], onHardLimit: [blockOrRequireApproval] }
  enforcementMode: reportOnly
---
# rh budget — comfortable cap so it contrasts with the tighter finance budget.
apiVersion: aiops.imperium.io/v1alpha1
kind: AIBudgetPolicy
metadata:
  name: rh-budget
  namespace: default
  labels: { app.kubernetes.io/name: ai-sovereign-finops-operator }
spec:
  target: { namespace: rh, team: rh, application: chatbot-rh }
  period: monthly
  budgetEUR: "0.20"
  warningThresholdPercent: 70
  criticalThresholdPercent: 90
  hardLimitPercent: 100
  actions: { onWarning: [alert], onCritical: [alert], onHardLimit: [blockOrRequireApproval] }
---
# legal budget — comfortable cap; legal shares the same live model as rh and
# finance, which keeps the shared-model attribution demo alive.
apiVersion: aiops.imperium.io/v1alpha1
kind: AIBudgetPolicy
metadata:
  name: legal-budget
  namespace: default
  labels: { app.kubernetes.io/name: ai-sovereign-finops-operator }
spec:
  target: { namespace: legal, team: legal, application: contract-review }
  period: monthly
  budgetEUR: "0.20"
  warningThresholdPercent: 70
  criticalThresholdPercent: 90
  hardLimitPercent: 100
  actions: { onWarning: [alert], onCritical: [alert], onHardLimit: [blockOrRequireApproval] }
