# Envoy AI Gateway — Gateway + Azure Foundry Cohere route/backend for the
# greenops demo. Real apps call this gateway; Envoy AI Gateway translates the
# OpenAI-format request to the Azure-compatible deployment path and emits real
# token-usage metrics per request. The Foundry API key is NOT in this file — it
# is created as a Secret from operateur/docs/foundrykey.txt (or operateur/docs/mistralkey.txt for
# backward compatibility) at deploy time.
#
# Real path verified on 2026-06-12 against the live account:
#   /openai/deployments/cohere-command-a-latest/chat/completions?api-version=2024-05-01-preview
#   -> HTTP 200
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: greenops-aigw
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: greenops-aigw
  namespace: default
spec:
  gatewayClassName: greenops-aigw
  listeners:
    - name: http
      protocol: HTTP
      port: 80
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: greenops-aigw
---
# Lean Envoy proxy (clear default cpu/mem requests so it fits a small kind node).
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: greenops-aigw
  namespace: default
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        container:
          resources: {}
---
# AI workloads need a larger client buffer than the 32kiB default.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: greenops-aigw-buffer
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: greenops-aigw
  connection:
    bufferLimit: 50Mi
---
# Stable data-plane Service used by consumer apps and quality evaluation Jobs.
apiVersion: v1
kind: Service
metadata:
  name: greenops-aigw
  namespace: envoy-gateway-system
  labels: { app: greenops-aigw }
spec:
  selector:
    gateway.envoyproxy.io/owning-gateway-name: greenops-aigw
  ports:
    - { name: http, port: 80, targetPort: 10080 }
---
# Route the non-French live deployment by the model header.
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: AIGatewayRoute
metadata:
  name: greenops-cohere
  namespace: default
spec:
  parentRefs:
    - name: greenops-aigw
      kind: Gateway
      group: gateway.networking.k8s.io
  rules:
    - matches:
        - headers:
            - type: Exact
              name: x-ai-eg-model
              value: cohere-command-a-latest
      backendRefs:
        - name: greenops-cohere
---
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: AIServiceBackend
metadata:
  name: greenops-cohere
  namespace: default
spec:
  schema:
    name: AzureOpenAI
    version: "2024-05-01-preview"
  backendRef:
    name: greenops-cohere
    kind: Backend
    group: gateway.envoyproxy.io
---
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: BackendSecurityPolicy
metadata:
  name: greenops-foundry-apikey
  namespace: default
spec:
  targetRefs:
    - group: aigateway.envoyproxy.io
      kind: AIServiceBackend
      name: greenops-cohere
  type: APIKey
  apiKey:
    secretRef:
      name: greenops-foundry-apikey
      namespace: default
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: greenops-cohere
  namespace: default
spec:
  endpoints:
    - fqdn:
        hostname: greenops-foundry.services.ai.azure.com
        port: 443
---
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: greenops-cohere-tls
  namespace: default
spec:
  targetRefs:
    - group: gateway.envoyproxy.io
      kind: Backend
      name: greenops-cohere
  validation:
    wellKnownCACertificates: "System"
    hostname: greenops-foundry.services.ai.azure.com
