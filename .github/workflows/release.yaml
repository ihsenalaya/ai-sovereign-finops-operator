name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/ai-sovereign-finops-operator
  CHART_REGISTRY: ghcr.io/${{ github.repository_owner }}/ai-sovereign-finops-operator/charts

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive version
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./operateur
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.v.outputs.version }}
            ${{ env.IMAGE }}:latest

  chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Derive version
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Check chart version
        run: |
          chart_version="$(sed -nE 's/^version:[[:space:]]*"?([^"]+)"?/\1/p' operateur/charts/ai-sovereign-finops-operator/Chart.yaml)"
          app_version="$(sed -nE 's/^appVersion:[[:space:]]*"?([^"]+)"?/\1/p' operateur/charts/ai-sovereign-finops-operator/Chart.yaml)"
          test "${chart_version}" = "${{ steps.v.outputs.version }}"
          test "${app_version}" = "${{ steps.v.outputs.version }}"
      - name: Lint chart
        run: helm lint operateur/charts/ai-sovereign-finops-operator
      - name: Package chart
        run: helm package operateur/charts/ai-sovereign-finops-operator --destination dist
      - name: Push chart
        run: helm push "dist/ai-sovereign-finops-operator-${{ steps.v.outputs.version }}.tgz" "oci://${{ env.CHART_REGISTRY }}"
