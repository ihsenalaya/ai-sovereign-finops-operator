{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "operator.fullname" . }}-manager-role
  labels:
    {{- include "operator.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["create", "get", "list", "patch", "update", "watch"]
- apiGroups: [""]
  resources: ["namespaces", "pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
- apiGroups: ["admissionregistration.k8s.io"]
  resources: ["mutatingwebhookconfigurations"]
  verbs: ["create", "get", "list", "patch", "update", "watch"]
- apiGroups: ["aiops.imperium.io"]
  resources:
  - aibreakevenanalyses
  - aibudgetpolicies
  - aifinopsreports
  - aigateways
  - aimodels
  - aiproviders
  - aisovereigntypolicies
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: ["aiops.imperium.io"]
  resources:
  - aibreakevenanalyses/finalizers
  - aibudgetpolicies/finalizers
  - aifinopsreports/finalizers
  - aigateways/finalizers
  - aimodels/finalizers
  - aiproviders/finalizers
  - aisovereigntypolicies/finalizers
  verbs: ["update"]
- apiGroups: ["aiops.imperium.io"]
  resources:
  - aibreakevenanalyses/status
  - aibudgetpolicies/status
  - aifinopsreports/status
  - aigateways/status
  - aimodels/status
  - aiproviders/status
  - aisovereigntypolicies/status
  verbs: ["get", "patch", "update"]
# Enforcement slice 2: reroute forbidden models at the Envoy AI Gateway data plane.
- apiGroups: ["aigateway.envoyproxy.io"]
  resources: ["aigatewayroutes"]
  verbs: ["get", "list", "watch", "update", "patch"]
{{- if .Values.leaderElection.enabled }}
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["create", "get", "list", "update", "watch"]
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "operator.fullname" . }}-manager-rolebinding
  labels:
    {{- include "operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "operator.fullname" . }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ include "operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
